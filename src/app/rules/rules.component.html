<main>
    <div class="container-fluid p-5">
        <div class="mb-2">
            <a routerLink="" class="btn btn-primary"><i class="bi bi-arrow-left-square me-2"></i>Inicio</a>
        </div>
        <div class="card">
            <div class="card-header text-center">
                <h2 class="ml-2">Reglas del ST</h2>
            </div>
            <div class="card-body">
                <div class="col-md-8 offset-md-2">
                    <table class="table table-hover" id="rules-table">
                        <tbody>
                            <tr *ngFor="let rule of rules" (click)="ruleClick($event)">
                                <td style="min-width: 1px; width:1px; text-align:end" [ngStyle]="{ 'background' : 'rgba(30, 144, 255, '+((100-(rule.id!-1)*8)/100)+')' }">{{ rule.id }}</td>
                                <td [ngStyle]="{ 'background' : 'rgba(30, 144, 255, '+((100-(rule.id!-1)*8)/100)+')' }">{{ rule.text }}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
