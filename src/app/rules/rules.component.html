<main>
    <div class="container-fluid">
        <div class="card">
            <div class="card-header">
                <h2 class="ml-2">Reglas</h2>
            </div>
            <div class="card-body">
                <table class="table">
                    <tbody>
                        <tr *ngFor="let rule of rules">
                            <td style="min-width: 1px; width:1px; text-align:end">{{ rule.id }}</td>
                            <td>{{ rule.text }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
